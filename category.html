<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NutriCheck — Category</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<nav>
  <a href="index.html" class="logo">
    <span class="l1">Nutri</span><span class="l2">Check</span><span class="l3">™</span>
  </a>
  <span class="nav-tagline">Know what you eat. Own your health.</span>
</nav>

<div id="pageContent"></div>

<footer>
  <div class="footer-logo">
    <span class="l1">Nutri</span><span class="l2">Check</span><span class="l3">™</span>
  </div>
  <p>Developed by <span class="dev">Shrivatts Rastogi</span></p>
  <p><span class="copy">© 2026 NutriCheck.</span> All rights reserved.</p>
  <p class="disclaimer">Data is for educational purposes only. Consult a registered nutritionist for personalized dietary advice.</p>
</footer>

<script src="data.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const catId = params.get('cat');
  const cat = categories.find(c => c.id === catId);
  const catItems = items[catId] || [];

  if (!cat) {
    document.getElementById('pageContent').innerHTML = `
      <div style="text-align:center;padding:5rem;color:var(--muted)">
        <div style="font-size:3rem;margin-bottom:1rem">🔍</div>
        <h2 style="color:#fff;margin-bottom:1rem">Category not found</h2>
        <a href="index.html" style="color:var(--blue)">← Back to Home</a>
      </div>`;
  } else {
    document.title = `NutriCheck — ${cat.name}`;

    let ddCounter = 0;

    function dropdown(icon, label, content) {
      const id = `dd_${ddCounter++}`;
      return `
        <div class="dropdown" id="${id}">
          <button class="dropdown-toggle" onclick="toggleDD('${id}')">
            <span class="dtitle"><span class="dicon">${icon}</span><span class="dlabel">${label}</span></span>
            <span class="dropdown-arrow">▼</span>
          </button>
          <div class="dropdown-content">${content}</div>
        </div>`;
    }

    function nutritionTable(nutrition) {
      return `<table class="nutrition-table">
        <tr><th>Nutrient</th><th>Amount</th></tr>
        ${Object.entries(nutrition).map(([k,v]) => `<tr><td>${k}</td><td>${v}</td></tr>`).join('')}
      </table>`;
    }

    function tags(arr, type) {
      if (!arr || !arr.length) return '<span style="color:var(--muted);font-size:0.8rem">None listed</span>';
      return `<div class="tags">${arr.map(t => `<span class="tag ${type}">${t}</span>`).join('')}</div>`;
    }

    function harmPanel(item) {
      if (!item.substanceHarms || !item.substanceHarms.length) return '';
      return `
        <div class="harm-alert">
          <div class="harm-alert-title">☣️ What's Actually Harming You</div>
          <div class="substance-list">
            ${item.substanceHarms.map(s => `
              <div class="substance-item">
                <div class="substance-name">
                  ⚗️ ${s.name}
                  ${s.banned ? '<span class="banned-tag">🚫 BANNED in some countries</span>' : ''}
                </div>
                <div class="substance-harm">${s.harm}</div>
              </div>`).join('')}
          </div>
        </div>`;
    }

    function renderCard(item) {
      const isHarmful = item.harmful === true;
      const hasWarnings = item.warnings && item.warnings.length;
      const hasBenefits = item.benefits && item.benefits.length;
      const hasDeficiencies = item.deficiencies && item.deficiencies.length;

      let bodyContent = '';

      if (isHarmful) {
        // Harmful: everything in dropdowns
        bodyContent = [
          dropdown('📊', 'Nutrition Facts', nutritionTable(item.nutrition)),
          hasBenefits ? dropdown('✅', 'Benefits', tags(item.benefits, 'benefit')) : '',
          hasWarnings ? dropdown('⚠️', 'Health Warnings', tags(item.warnings, 'warning')) : '',
          hasDeficiencies ? dropdown('💊', 'Deficiencies It Helps Cure', tags(item.deficiencies, 'deficiency')) : '',
        ].join('');
      } else {
        // Healthy: benefits & deficiencies always visible, nutrition in dropdown
        bodyContent = `
          ${hasBenefits ? `
            <div class="inline-section">
              <div class="inline-label">✅ Benefits</div>
              ${tags(item.benefits, 'benefit')}
            </div>` : ''}
          ${hasDeficiencies ? `
            <div class="inline-section">
              <div class="inline-label">💊 Deficiencies It Helps Cure</div>
              ${tags(item.deficiencies, 'deficiency')}
            </div>` : ''}
          ${hasWarnings ? `
            <div class="inline-section">
              <div class="inline-label">⚠️ Notes</div>
              ${tags(item.warnings, 'warning')}
            </div>` : ''}
          ${dropdown('📊', 'Nutrition Facts', nutritionTable(item.nutrition))}
        `;
      }

      const dropdowns = bodyContent;

      return `
        <div class="item-card ${isHarmful ? 'harmful' : 'healthy'}">
          <div class="item-header">
            <div class="item-emoji">${item.image && item.image.startsWith('http') ? `<img src="${item.image}" alt="${item.name}" onerror="this.parentElement.innerHTML='🥦'" />` : item.image}</div>
            <div class="item-meta">
              <h3>${item.name}</h3>
              ${item.brand ? `<div class="brand">🏷️ ${item.brand}</div>` : ''}
              <div class="calories">🔥 ${item.calories}</div>
              <span class="badge ${isHarmful ? 'harmful' : 'healthy'}">
                ${isHarmful ? '⚠️ Harmful' : '✅ Healthy'}
              </span>
            </div>
          </div>
          ${isHarmful ? harmPanel(item) : ''}
          <div class="item-body">${dropdowns}</div>
        </div>`;
    }

    const searchId = `search_${catId}`;
    document.getElementById('pageContent').innerHTML = `
      <div class="cat-page-hero">
        <a href="index.html" class="back-btn">← Back to Categories</a>
        <h1>${cat.icon} ${cat.name}</h1>
        <p>${cat.description} &mdash; ${catItems.length} items</p>
      </div>
      <div class="controls-bar">
        <div class="search-bar">
          <input type="text" id="${searchId}" placeholder="Search ${cat.name.toLowerCase()}..." oninput="applyFilters()" />
        </div>
        <div class="filter-tabs">
          <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">All <span class="filter-count" id="fc-all">${catItems.length}</span></button>
          <button class="filter-btn healthy" data-filter="healthy" onclick="setFilter('healthy', this)">✅ Healthy <span class="filter-count" id="fc-healthy">${catItems.filter(i => !i.harmful).length}</span></button>
          <button class="filter-btn harmful" data-filter="harmful" onclick="setFilter('harmful', this)">⚠️ Harmful <span class="filter-count" id="fc-harmful">${catItems.filter(i => i.harmful).length}</span></button>
        </div>
      </div>
      <div class="items-grid" id="itemsGrid">
        ${catItems.map(renderCard).join('')}
      </div>`;

    window.toggleDD = function(id) {
      const el = document.getElementById(id);
      el.classList.toggle('open');
    };

    let activeFilter = 'all';

    window.setFilter = function(filter, btn) {
      activeFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      applyFilters();
    };

    window.applyFilters = function() {
      const query = document.getElementById(searchId).value.toLowerCase();
      const grid = document.getElementById('itemsGrid');
      ddCounter = 0;

      let filtered = catItems.filter(item => {
        const matchesSearch = !query ||
          item.name.toLowerCase().includes(query) ||
          (item.brand && item.brand.toLowerCase().includes(query));
        const matchesFilter =
          activeFilter === 'all' ||
          (activeFilter === 'healthy' && !item.harmful) ||
          (activeFilter === 'harmful' && item.harmful);
        return matchesSearch && matchesFilter;
      });

      grid.innerHTML = filtered.length > 0
        ? filtered.map(renderCard).join('')
        : `<div style="grid-column:1/-1;text-align:center;padding:4rem;color:var(--muted)">
            <div style="font-size:2.5rem;margin-bottom:1rem">🔍</div>
            No results found
           </div>`;
    };

    // keep old name working too
    window.filterItems = window.applyFilters;
  }
</script>
</body>
</html>
